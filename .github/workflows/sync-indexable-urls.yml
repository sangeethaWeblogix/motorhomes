name: Sync Indexable URLs JSON

# Keeps cfs-paths/indexable-urls.json (the client-safe copy of url.csv used by
# Listings.tsx to decide whether a page is eligible for Cloudflare KV caching)
# in sync automatically whenever url.csv changes. Without this, url.csv and
# indexable-urls.json can silently drift apart, and the client's indexed/
# noindex determination would go stale relative to the server's.
#
# Runs scripts/generate-indexable-urls-json.js and commits the regenerated
# JSON straight back to the branch that was pushed, only if it actually
# changed.

on:
  push:
    paths:
      - 'src/app/url.csv'

jobs:
  sync-indexable-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Regenerate indexable-urls.json from url.csv
        run: node scripts/generate-indexable-urls-json.js

      - name: Commit updated JSON if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfs-paths/indexable-urls.json
          if git diff --cached --quiet; then
            echo "indexable-urls.json already up to date — nothing to commit."
          else
            git commit -m "chore: sync indexable-urls.json from url.csv [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
